services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports: ['27017:27017']
    volumes: ['mongo_data:/data/db']
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    restart: unless-stopped
    ports: ['4000:4000']
    env_file: [./backend/.env]
    environment:
      MONGO_URI: mongodb://mongo:27017/segment_engine
      WORKER_ENABLED: 'true'    # this replica drives the scheduler
    depends_on:
      mongo: { condition: service_healthy }

  worker:
    build: ./backend
    restart: unless-stopped
    command: ["node", "src/workers/worker.js"]
    env_file: [./backend/.env]
    environment:
      MONGO_URI: mongodb://mongo:27017/segment_engine
      WORKER_ENABLED: 'false'   # workers execute jobs, they don't schedule them
    depends_on:
      mongo: { condition: service_healthy }

  web:
    build: ./frontend
    restart: unless-stopped
    ports: ['5173:80']          # nginx serves the build and proxies /api to api:4000
    depends_on: [api]

volumes:
  mongo_data:
