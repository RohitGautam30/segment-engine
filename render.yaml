services:
  - type: web
    name: segment-engine-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: node scripts/sync-indexes.js && node src/server.js
    healthCheckPath: /api/v1/system/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: MONGO_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: INGEST_API_KEYS
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: DEFAULT_ADMIN_EMAIL
        sync: false
      - key: DEFAULT_ADMIN_PASSWORD
        sync: false
      - key: WORKER_ENABLED
        value: true

  - type: worker
    name: segment-engine-worker
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: node src/workers/worker.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: WORKER_ENABLED
        value: false